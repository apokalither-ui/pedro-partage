<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de la Bombe 💣</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #f43f5e;
        }

        .bomb-container {
            font-size: 80px;
            margin: 15px 0;
            transition: transform 0.2s ease;
        }

        /* Animation quand le temps presse */
        .shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-2px, 0px) rotate(-3deg); }
            40% { transform: translate(2px, 2px) rotate(3deg); }
            60% { transform: translate(-1px, -1px) rotate(1deg); }
            80% { transform: translate(2px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .timer-val { color: #f43f5e; }
        .attempts-val { color: #38bdf8; }

        .hint-box {
            background: #334155;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="number"] {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: #38bdf8;
        }

        button {
            padding: 14px 24px;
            border-radius: 8px;
            border: none;
            background: #10b981;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover { background: #059669; }
        button:active { transform: scale(0.98); }

        .btn-reset {
            width: 100%;
            background: #f43f5e;
            display: none;
        }

        .btn-reset:hover { background: #e11d48; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Désamorce la Bombe !</h1>
        <p style="color: #94a3b8; font-size: 0.9rem;">Devine le nombre entre 1 et 100</p>
        
        <div class="bomb-container" id="bomb">💣</div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">TEMPS RESTANT</div>
                <div class="stat-value timer-val" id="timer">30s</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ESSAIS RESTANTS</div>
                <div class="stat-value attempts-val" id="attempts">7</div>
            </div>
        </div>

        <div class="hint-box" id="hint">Entrez une proposition...</div>

        <div class="input-group" id="controls">
            <input type="number" id="guessInput" min="1" max="100" placeholder="Ex: 50">
            <button onclick="checkGuess()">Tester</button>
        </div>

        <button class="btn-reset" id="resetBtn" onclick="initGame()">Rejouer une partie</button>
    </div>

    <script>
        let secretNum, attempts, timeLeft, timerInterval, isGameOver;

        function initGame() {
            secretNum = Math.floor(Math.random() * 100) + 1;
            attempts = 7;
            timeLeft = 30;
            isGameOver = false;

            document.getElementById('attempts').textContent = attempts;
            document.getElementById('timer').textContent = timeLeft + 's';
            document.getElementById('hint').textContent = "Entrez un nombre entre 1 et 100";
            document.getElementById('hint').style.color = "#f8fafc";
            document.getElementById('bomb').textContent = "💣";
            document.getElementById('bomb').classList.remove('shake');
            document.getElementById('controls').style.display = "flex";
            document.getElementById('resetBtn').style.display = "none";
            document.getElementById('guessInput').value = "";

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft + 's';

            if (timeLeft <= 10) {
                document.getElementById('bomb').classList.add('shake');
            }

            if (timeLeft <= 0) {
                endGame(false, "💥 BOUM ! Le temps s'est écoulé !");
            }
        }

        function checkGuess() {
            if (isGameOver) return;

            const input = document.getElementById('guessInput');
            const val = parseInt(input.value);

            if (isNaN(val) || val < 1 || val > 100) {
                document.getElementById('hint').textContent = "⚠️ Entrez un nombre valide (1-100) !";
                return;
            }

            attempts--;
            document.getElementById('attempts').textContent = attempts;

            if (val === secretNum) {
                endGame(true, "🎉 BRAVO ! Bombe désamorcée !");
            } else if (attempts <= 0) {
                endGame(false, 💥 BOUM ! Plus d'essais ! Le nombre était ${secretNum}.);
            } else if (val < secretNum) {
                document.getElementById('hint').textContent = "➡️ C'est PLUS !";
            } else {
                document.getElementById('hint').textContent = "➡️ C'est MOINS !";
            }

            input.value = "";
            input.focus();
        }

        function endGame(win, message) {
            isGameOver = true;
            clearInterval(timerInterval);
            document.getElementById('bomb').classList.remove('shake');
            document.getElementById('hint').textContent = message;
            document.getElementById('hint').style.color = win ? "#10b981" : "#f43f5e";
            document.getElementById('bomb').textContent = win ? "✨" : "💥";
            document.getElementById('controls').style.display = "none";
            document.getElementById('resetBtn').style.display = "block";
        }

        // Lancer la première partie au chargement
        initGame();
    </script>
</body>
</html>
